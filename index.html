<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>on&off 팬미팅 견적 대시보드</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>on&off 팬미팅 견적 대시보드</h1>
    <div class="exchange-info">
      <span id="exchange-rate">환율 로딩중...</span>
      <span id="exchange-date"></span>
      <button onclick="refreshData()" class="refresh-btn">새로고침</button>
    </div>
  </header>
  <main>
    <section class="summary-section">
      <h2>종합 수익 요약</h2>
      <div id="dashboard-area"></div>
    </section>
    <section class="summary-section">
      <h2>수익 배분</h2>
      <div id="distribution-area"></div>
    </section>
    <section class="detail-section">
      <h2>한국 (헤븐리) 견적 상세</h2>
      <div id="kr-detail"></div>
    </section>
    <section class="detail-section">
      <h2>일본 (IMX) 견적 - 와테라스 160석</h2>
      <div id="jp-detail"></div>
    </section>
    <section class="detail-section">
      <h2>MD 판매</h2>
      <div id="md-detail"></div>
    </section>
  </main>
  <footer>
    <p>데이터: <a href="https://docs.google.com/spreadsheets/d/1o5XdAT1wg8Jv5Boj6rdy_klGJHlB_am4E7eZXs9S15s/edit" target="_blank">Google Spreadsheet</a></p>
    <p id="last-update"></p>
  </footer>
  <script src="js/app.js"></script>
</body>
</html>
