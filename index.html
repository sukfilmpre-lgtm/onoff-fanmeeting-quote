<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>on&off 팬미팅 견적</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <b>on&off 팬미팅 견적 대시보드</b>
  <div class="info"><span id="rate">...</span><button onclick="init()">새로고침</button></div>
</header>
<main>
  <h2>종합 수익 요약</h2>
  <div id="summary"><p class="loading">로딩 중...</p></div>

  <h2>수익 배분</h2>
  <div id="dist"><p class="loading">로딩 중...</p></div>
  <div class="option-bar">
    <label class="chk-label"><input type="checkbox" id="chk-video" onchange="init()"> 영상제작비 포함 <span class="chk-desc">촬영+종편 ₩5,000,000</span></label>
  </div>

  <div class="toggle">
    <h2>한국 (헤븐리) 견적 상세</h2>
    <div class="content" id="kr-detail"></div>
  </div>
  <div class="toggle">
    <h2>일본 (IMX) 견적 - 와테라스 160석</h2>
    <div class="content" id="jp-detail"></div>
  </div>
  <div class="toggle">
    <h2>MD 판매</h2>
    <div class="content" id="md-detail"></div>
  </div>
</main>
<footer>
  <a href="https://docs.google.com/spreadsheets/d/1o5XdAT1wg8Jv5Boj6rdy_klGJHlB_am4E7eZXs9S15s/edit" target="_blank">Google Spreadsheet</a>
  · <span id="status"></span>
</footer>
<script src="js/app.js"></script>
</body>
</html>
